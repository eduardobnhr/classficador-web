<section class="auth-page register-page">
  <div class="brand-corner">classificador-web</div>
  <i class="pi pi-question-circle help-corner"></i>

  <form class="auth-card register-card" [formGroup]="form" (ngSubmit)="submit()">
    <div class="auth-card-head">
      <h2>Novo Acesso</h2>
      <p>Preencha os dados para registrar-se no Classificador-Web</p>
    </div>

    <label class="field-stack">
      <span>Nome</span>
      <input pInputText formControlName="name" placeholder="Seu nome completo" />
    </label>

    <label class="field-stack">
      <span>E-mail</span>
      <input pInputText type="email" formControlName="email" placeholder="exemplo@dominio.com" />
    </label>

    <label class="field-stack">
      <span>Senha</span>
      <p-password formControlName="password" [feedback]="false" [toggleMask]="true" styleClass="w-full" inputStyleClass="w-full" />
    </label>

    <label class="field-stack">
      <span>Confirmar senha</span>
      <p-password formControlName="confirmPassword" [feedback]="false" [toggleMask]="true" styleClass="w-full" inputStyleClass="w-full" />
    </label>

    <button pButton type="submit" label="Criar Conta" class="primary-btn auth-submit" [loading]="loading"></button>

    <p class="auth-switch">
      Ja possui uma conta?
      <a routerLink="/login">Entrar agora</a>
    </p>
  </form>

  <div class="register-footer">Privacy Policy <span>System status: online</span> v4.2.0</div>
</section>
